name: Calibre
options:
  bundleIdPrefix: com.buycalibre
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  CalibreKit:
    path: Packages/CalibreKit
  CalibreDesign:
    path: Packages/CalibreDesign
  StripeiOS:
    url: https://github.com/stripe/stripe-ios
    from: 26.2.0
  Nuke:
    url: https://github.com/kean/Nuke
    from: 13.0.6

configFiles:
  Debug: Calibre/Config/Debug.xcconfig
  Release: Calibre/Config/Release.xcconfig

targets:
  Calibre:
    type: application
    platform: iOS
    sources:
      - path: Calibre
    dependencies:
      - package: CalibreKit
      - package: CalibreDesign
      - package: StripeiOS
        products:
          - StripePaymentSheet
          - StripeConnect
      - package: Nuke
        products:
          - Nuke
          - NukeUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buycalibre.calibre
        MARKETING_VERSION: 1.0.3
        CURRENT_PROJECT_VERSION: 4
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: 6.0
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CODE_SIGN_ENTITLEMENTS: Calibre/Config/Calibre.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    info:
      path: Calibre/Config/Info.plist
      properties:
        CFBundleDisplayName: Calibre
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: Calibre uses the camera to photograph watches you list for sale and, during seller verification, to capture identity documents.
        NSPhotoLibraryUsageDescription: Calibre lets you choose existing photos of your watch when creating a listing.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - calibre
        CalibreAPIBaseURL: $(API_BASE_URL)
  CalibreUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CalibreUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Calibre

schemes:
  Calibre:
    build:
      targets:
        Calibre: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CalibreUITests
        - package: CalibreKit/CalibreKitTests
        - package: CalibreDesign/CalibreDesignTests
    archive:
      config: Release
